---
# session__param_id: Session detail with equipment, log entries, images, and sharing.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://session/session-001

# 1. Assert screen
- assertVisible:
    id: e2e-screen-session__param_id

# 2. Assert seed session data
- assertVisible: E2E seeded session
- assertVisible: E2E Telescope
- assertVisible: E2E Camera

# 3. Assert action controls
- assertVisible:
    id: e2e-action-session__param_id-share
- assertVisible:
    id: e2e-action-session__param_id-open-edit
- assertVisible:
    id: e2e-action-session__param_id-back

# 4. Open edit sheet and dismiss
- tapOn:
    id: e2e-action-session__param_id-open-edit
- back

# 5. Navigate back to sessions list
- tapOn:
    id: e2e-action-session__param_id-back
- assertVisible:
    id: e2e-screen-tabs__sessions
- assertVisible: E2E seeded session
