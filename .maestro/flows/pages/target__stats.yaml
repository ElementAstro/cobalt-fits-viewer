---
# target__stats: Target statistics dashboard with aggregate metrics.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://target/stats

# 1. Assert screen
- assertVisible:
    id: e2e-screen-target__stats

# 2. Assert back button
- assertVisible:
    id: e2e-action-target__stats-back

# 3. Navigate back to targets list
- tapOn:
    id: e2e-action-target__stats-back
- assertVisible:
    id: e2e-screen-tabs__targets
- assertVisible: M42

# 4. Re-enter stats via targets list button
- tapOn:
    id: e2e-action-tabs__targets-open-stats
- assertVisible:
    id: e2e-screen-target__stats

# 5. Screenshot
- takeScreenshot: screenshots/target__stats
