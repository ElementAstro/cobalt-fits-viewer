---
# settings__gallery: Gallery display settings with grid columns, list style, and thumbnail options.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://settings/gallery

# 1. Assert screen
- assertVisible:
    id: e2e-screen-settings__gallery

# 2. Assert option rows
- assertVisible:
    id: e2e-action-settings__gallery-open-grid-columns
- assertVisible:
    id: e2e-action-settings__gallery-open-file-list-style

# 3. Open grid columns picker and dismiss
- tapOn:
    id: e2e-action-settings__gallery-open-grid-columns
- back

# 4. Open file list style picker and dismiss
- tapOn:
    id: e2e-action-settings__gallery-open-file-list-style
- back

# 5. Verify screen intact
- assertVisible:
    id: e2e-screen-settings__gallery
