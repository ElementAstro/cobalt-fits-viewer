---
# header__param_id: FITS header metadata viewer with grouped key-value display.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://header/fits-001

# 1. Assert screen
- assertVisible:
    id: e2e-screen-header__param_id

# 2. Assert seed filename
- assertVisible: M42_Light_001.fits

# 3. Assert controls
- assertVisible:
    id: e2e-action-header__param_id-back

# 4. Toggle header group sections
- tapOn:
    id: e2e-action-header__param_id-group-observation

# 5. Navigate back to files list
- tapOn:
    id: e2e-action-header__param_id-back
- assertVisible:
    id: e2e-screen-tabs__index
