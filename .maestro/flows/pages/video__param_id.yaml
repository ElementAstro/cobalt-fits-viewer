---
# video__param_id: Video player with playback controls, rate cycling, and processing queue.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://video/video-001

# 1. Assert screen
- assertVisible:
    id: e2e-screen-video__param_id

# 2. Assert seed video filename
- assertVisible: Jupiter_001.mp4

# 3. Assert playback controls
- assertVisible:
    id: e2e-action-video__param_id-play-pause
- assertVisible:
    id: e2e-action-video__param_id-cycle-rate

# 4. Test play/pause toggle
- tapOn:
    id: e2e-action-video__param_id-play-pause
- tapOn:
    id: e2e-action-video__param_id-play-pause

# 5. Cycle playback rate
- tapOn:
    id: e2e-action-video__param_id-cycle-rate

# 6. Open processing queue sheet and dismiss
- tapOn:
    id: e2e-action-video__param_id-open-queue
- back

# 7. Verify screen intact
- assertVisible:
    id: e2e-screen-video__param_id
