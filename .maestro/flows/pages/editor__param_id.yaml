---
# editor__param_id: Image editor with tools, undo/redo, star detection, and export.
- runFlow: ../common/bootstrap.yaml
- openLink: cobalt://editor/fits-001

# 1. Assert screen
- assertVisible:
    id: e2e-screen-editor__param_id

# 2. Assert seed filename
- assertVisible: M42_Light_001.fits

# 3. Assert header toolbar controls
- assertVisible:
    id: e2e-action-editor__param_id-undo
- assertVisible:
    id: e2e-action-editor__param_id-redo
- assertVisible:
    id: e2e-action-editor__param_id-toggle-original
- assertVisible:
    id: e2e-action-editor__param_id-open-export

# 4. Screenshot
- takeScreenshot: screenshots/editor__param_id

# 5. Toggle original view twice
- tapOn:
    id: e2e-action-editor__param_id-toggle-original
- tapOn:
    id: e2e-action-editor__param_id-toggle-original

# 6. Open rotate tool and apply rotation
- tapOn:
    id: e2e-action-editor__param_id-tool-rotate
- tapOn:
    id: e2e-action-editor__param_id-rotate90cw

# 7. Test undo/redo
- tapOn:
    id: e2e-action-editor__param_id-undo
- tapOn:
    id: e2e-action-editor__param_id-redo

# 8. Open export dialog
- tapOn:
    id: e2e-action-editor__param_id-open-export
- assertVisible:
    id: e2e-action-export-dialog-export

# 9. Dismiss export and go back
- back
- tapOn:
    id: e2e-action-editor__param_id-back
- assertVisible:
    id: e2e-screen-tabs__index
